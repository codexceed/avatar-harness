name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # search_repo shells out to ripgrep; the tool tests exercise it for real.
      - name: Install ripgrep
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Sync dependencies (locked)
        run: uv sync --frozen

      # Fail-fast staged gate: compile/import -> lint -> types -> docs -> deps -> tests.
      - name: Hard gate
        run: make check-hard

      # Report-only: coverage ratchet, dead code, dependency CVEs.
      - name: Soft gate
        run: make check-soft
        continue-on-error: true
