name: release-please

# Conventional-commit-driven release automation: maintains CHANGELOG.md, bumps the
# version (pyproject.toml + __init__.py), and opens a release PR. Merging that PR tags
# the release and publishes a GitHub Release. See release-please-config.json.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

# Never cancel a release run mid-flight.
concurrency:
  group: release-please
  cancel-in-progress: false

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      # Author the release PR with a PAT (contents + pull-requests: write), NOT the
      # default GITHUB_TOKEN. A GITHUB_TOKEN-authored PR comes from github-actions[bot],
      # whose workflow runs GitHub holds behind a "requires approval from a maintainer"
      # gate every release. A PR from the PAT owner (a real collaborator) runs CI without
      # that gate. See https://github.com/googleapis/release-please-action#github-credentials
      - uses: googleapis/release-please-action@v4
        with:
          token: ${{ secrets.RELEASE_APPROVE_TOKEN }}
