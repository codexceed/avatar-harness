# avatar-harness — uv workspace root (virtual: ships nothing of its own).
#
# It ties together the distributable members and centralizes the dev toolchain +
# lint/type/test config so the gate runs once over the whole repo. Each member owns
# its package metadata in its own pyproject.toml:
#   avatar-harness/  -> the `avatar-harness` SDK (import `avatar`, CLI `avatar`)
#   jo-cli/          -> the `jo-cli` reference cockpit (import `jo`, CLI `jo`)   [added on extraction]
# `evals/` and `tests/` stay at the repo root as dev tooling / the unified suite.

[tool.uv.workspace]
members = ["avatar-harness", "jo-cli"]

[dependency-groups]
# Hard-gate tools are pinned and installed (reproducible CI gate).
# Soft-gate tools (interrogate, vulture, pip-audit, semgrep) run via `uvx` in the
# Makefile/CI so they don't bloat the locked dev environment (goal: minimal deps).
dev = [
    "ruff>=0.5",
    "pyrefly>=1.0,<1.1",
    "pydoclint>=0.5",
    "deptry>=0.20",
    "pytest>=8.2",
    "pytest-asyncio>=0.23",
    "pre-commit>=3.7",
    "openai>=1.40",  # the OpenAI extra, installed for dev/CI so the test suite can exercise it
    # textual/rich are runtime deps of the `jo-cli` member, so the workspace install already
    # provides them for the cockpit tests — no need to list them here.
]

# --- Ruff: lint + format. Encodes readability (#1) and verbosity ceilings (#2). ---
[tool.ruff]
line-length = 110
target-version = "py312"
# Eval fixtures and research-experiment fixtures are deliberately-imperfect sample repos the
# agent operates on (a buggy function with no type hints, a secret file) — input data, not
# code we maintain. Don't lint or format them.
extend-exclude = ["evals/fixtures", "docs/research/2026-06-22-verification-authority"]

[tool.ruff.lint]
select = [
    "E", "F", "W",       # pycodestyle + pyflakes baseline
    "I",                 # import sorting (isort)
    "UP",                # pyupgrade — modern syntax
    "B",                 # bugbear — real bug patterns
    "SIM", "C4", "RET",  # anti-verbosity: simplify, comprehensions, returns
    "PTH",               # pathlib over os.path
    "C90",               # mccabe complexity ceiling
    "PL",                # pylint: too-many-args/branches/statements/returns
    "N",                 # pep8 naming
    "ANN",               # require annotations — types as documentation
    "D",                 # docstrings (Google convention, configured below)
    "S",                 # flake8-bandit security
    "ARG",               # unused arguments — agent bloat
    "ERA",               # commented-out code — agent litter
    "T20",               # stray print()
    "RUF",               # ruff-native rules
]
ignore = [
    "ANN401",  # allow explicit `Any` where genuinely needed
    "D107",    # __init__ docstring is redundant with the class docstring (avoid bloat — goal #2)
]

[tool.ruff.lint.per-file-ignores]
"tests/**" = ["D", "ANN", "S", "ARG", "PLR2004", "PLR0913"]
"**/__init__.py" = ["D104"]
# By-design: the harness exists to run external commands (ripgrep, test/lint runners).
# Subprocess use in these modules is the feature, not a smell — they validate paths/args themselves.
"avatar-harness/avatar/tools/search.py" = ["S603", "S607"]
"avatar-harness/avatar/workspace.py" = ["S603", "S607"]
# The CLI legitimately writes to stdout.
"avatar-harness/avatar/cli.py" = ["T201"]
# Build tooling, not library code: relax annotation/print/complexity strictness.
"scripts/**" = ["ANN", "T20", "C901", "PLR0912", "PLR0913", "PLR0915"]
# Eval tooling (dev, not shipped): running external commands and printing a report is the
# feature; it validates its own argv. The probe is a script that hooks imports/stdin.
"evals/**" = ["S603", "S607", "T201"]
"evals/probes/**" = ["S603", "S607", "T201", "ANN", "ARG", "PLR2004", "PLC0415"]

# Pin first-party detection so import sorting is identical everywhere. Auto-detection
# varies by environment (editable install vs clean CI checkout), which can make a
# mis-sorted import block pass locally but fail CI — pinning closes that blind spot.
[tool.ruff.lint.isort]
known-first-party = ["avatar", "jo", "evals"]

[tool.ruff.lint.mccabe]
max-complexity = 10

[tool.ruff.lint.pylint]
max-args = 6
max-branches = 12
max-statements = 50
max-returns = 6

[tool.ruff.lint.pydocstyle]
convention = "google"

# --- pydoclint: docstring<->signature agreement, Google style (#4). ---
# Types live in signatures (Pyrefly checks them), NOT duplicated in docstrings.
[tool.pydoclint]
style = "google"
# evals library modules are gated like the members; its probes (lightweight scripts) and
# fixtures (sample data) are excluded, mirroring the ruff carve-outs for those paths.
exclude = '\.venv|evals/fixtures|evals/probes'
arg-type-hints-in-docstring = false
check-return-types = false
check-yield-types = false
require-return-section-when-returning-nothing = false
# Enforce strictly: a one-line docstring on a function with params/returns is NOT a
# pass — it must still document Args/Returns. (Default skips short docstrings, which
# silently let undocumented args/returns through.)
skip-checking-short-docstrings = false
# Don't require re-documenting class attributes in docstrings: types live in the
# signature/field definitions (Pyrefly checks them) and duplicating every pydantic
# field in the docstring is exactly the verbosity this project avoids.
check-class-attributes = false

# --- Pyrefly: sole hard type gate (#1). Pinned to 1.0.x; bump deliberately. ---
[tool.pyrefly]
# Member packages + dev tooling are all held to the type gate, except evals' probes (runtime
# scripts that import agent-generated modules, e.g. `import calc`, unresolvable statically) and
# its fixtures (deliberately-imperfect sample repos), excluded as ruff excludes them.
project-includes = ["avatar-harness", "jo-cli", "tests", "evals"]
project-excludes = ["**/__pycache__/**", "**/.[!/.]*/**", "evals/fixtures", "evals/probes"]
# Member dirs are import roots so `import avatar` / `import jo` resolve to avatar-harness/avatar
# and jo-cli/jo (flat layout). `tests` is an import root too, so shared test stubs in
# `tests/conftest.py` (e.g. ScriptedModel, imported as `from conftest import ...`) resolve under
# the type checker as they do under pytest. `.` makes the root-level `evals` package importable.
search-path = ["avatar-harness", "jo-cli", "tests", "."]
python-version = "3.12"

# --- interrogate: docstring coverage ratchet (soft). Run via uvx. ---
[tool.interrogate]
fail-under = 85  # current baseline (public API ~100%; remainder is private helpers) — ratchet upward
ignore-init-method = true
ignore-magic = true
ignore-nested-functions = true
ignore-private = true
ignore-module = false
exclude = ["tests", "build", "dist"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
# Repo root on sys.path so tests can import the root-level `evals` package (dev tooling,
# deliberately outside the shipped members). The `avatar`/`jo` packages resolve via the
# editable workspace install, not this path.
pythonpath = ["."]
