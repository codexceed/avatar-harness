# Hard-gate hooks only. Soft tools (interrogate/vulture/pip-audit/semgrep) run via
# `make check-soft` and CI, not on every commit.
# NOTE: keep this rev in lockstep with the `ruff` dev dependency (uv.lock) — a skew
# lets one ruff strip a noqa the other still enforces. Bump both together.
repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.16
    hooks:
      - id: ruff-check
        args: [--fix]
      - id: ruff-format

  - repo: local
    hooks:
      - id: compileall
        name: compileall (syntax — compiles)
        entry: python -m compileall -q avatar-harness jo-cli tests evals
        language: system
        types: [python]
        pass_filenames: false

      - id: pyrefly
        name: pyrefly (type check)
        entry: uv run pyrefly check
        language: system
        types: [python]
        pass_filenames: false

      - id: pydoclint
        name: pydoclint (Google docstrings)
        entry: uv run pydoclint avatar-harness jo-cli evals
        language: system
        types: [python]
        pass_filenames: false

      - id: deptry
        name: deptry (dependency hygiene)
        # deptry resolves against one package's declared deps; run it inside each member
        # (the virtual workspace root declares none). evals is dev tooling, not gated.
        entry: bash -c 'cd avatar-harness && uv run deptry avatar && cd ../jo-cli && uv run deptry jo'
        language: system
        types: [python]
        pass_filenames: false
